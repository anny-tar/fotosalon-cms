{% extends 'panel/base.html' %}
{% block title %}Настройки SMTP{% endblock %}
{% block page_title %}Настройки SMTP{% endblock %}
{% block nav_settings %}active{% endblock %}

{% block content %}

<div class="tab-bar">
    <a href="/panel/settings/" class="tab">Общие</a>
    <a href="/panel/settings/contact/" class="tab">Контакты</a>
    <a href="/panel/settings/smtp/" class="tab tab-active">SMTP</a>
    <a href="/panel/settings/sections/" class="tab">Конструктор страниц</a>
</div>

<form method="post" class="detail-card">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-group">
            <label>SMTP сервер</label>
            <input type="text" name="host"
                   value="{{ smtp.host|default:'' }}"
                   placeholder="smtp.gmail.com">
        </div>
        <div class="form-group">
            <label>Порт</label>
            <input type="number" name="port"
                   value="{{ smtp.port|default:'587' }}">
        </div>
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username"
                   value="{{ smtp.username|default:'' }}">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password"
                   placeholder="Оставьте пустым чтобы не менять">
        </div>
        <div class="form-group">
            <label>Адрес отправителя</label>
            <input type="email" name="from_email"
                   value="{{ smtp.from_email|default:'' }}">
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="use_tls"
                    {% if smtp.use_tls or not smtp %}checked{% endif %}>
                Использовать TLS
            </label>
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
</form>

{% endblock %}
