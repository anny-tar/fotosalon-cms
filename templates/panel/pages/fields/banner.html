<h3 style="margin-bottom:16px;font-size:15px;color:#374151">Настройка баннера</h3>

<!-- Заголовок -->
<div class="section-field-group">
    <label class="field-checkbox">
        <input type="checkbox" name="show_title" checked>
        Показывать заголовок
    </label>
    <div class="form-group" style="margin-top:8px">
        <input type="text" name="title"
               placeholder="Можно использовать {site_name}">
        <small style="color:#6b7280;font-size:11px;margin-top:3px;display:block">
            {site_name} — название организации, {slogan} — слоган
        </small>
    </div>
</div>

<!-- Подзаголовок -->
<div class="section-field-group">
    <label class="field-checkbox">
        <input type="checkbox" name="show_subtitle" checked>
        Показывать подзаголовок
    </label>
    <div class="form-group" style="margin-top:8px">
        <textarea name="subtitle" rows="2"
                  placeholder="Краткое описание. Можно использовать {slogan}"></textarea>
    </div>
</div>

<!-- Кнопка 1 -->
<div class="section-field-group">
    <label class="field-checkbox">
        <input type="checkbox" name="show_btn1" checked>
        Показывать кнопку 1 (акцентная)
    </label>
    <div class="form-grid" style="margin-top:8px">
        <div class="form-group">
            <label>Текст</label>
            <input type="text" name="btn1_text" placeholder="Записаться">
        </div>
        <div class="form-group">
            <label>Ссылка</label>
            <input type="text" name="btn1_url" placeholder="/booking/">
        </div>
    </div>
</div>

<!-- Кнопка 2 -->
<div class="section-field-group">
    <label class="field-checkbox">
        <input type="checkbox" name="show_btn2" checked>
        Показывать кнопку 2 (контурная)
    </label>
    <div class="form-grid" style="margin-top:8px">
        <div class="form-group">
            <label>Текст</label>
            <input type="text" name="btn2_text" placeholder="Подробнее">
        </div>
        <div class="form-group">
            <label>Ссылка</label>
            <input type="text" name="btn2_url" placeholder="/services/">
        </div>
    </div>
</div>

<!-- Фоновое изображение -->
<div class="section-field-group">
    <label class="field-checkbox">
        <input type="checkbox" name="show_image" checked>
        Показывать фоновое изображение
    </label>
    <div style="margin-top:8px">
        <div class="form-group">
            <label>Загрузить изображение</label>
            <input type="file" name="image_file" accept="image/*"
                   onchange="uploadSectionImage(this, 'banner_image_path', 'banner_image_preview', 'sections/banner')">
            <input type="hidden" name="image" id="banner_image_path">
        </div>
        <div id="banner_image_preview" style="margin-top:6px"></div>
        <div class="form-group">
            <label>Фильтр изображения</label>
            <select name="image_filter">
                <option value="dark">Затемнённое</option>
                <option value="light">Засветлённое</option>
                <option value="none">Без фильтра</option>
            </select>
        </div>
    </div>
</div>

<!-- Выравнивание -->
<div class="form-group">
    <label>Выравнивание текста</label>
    <select name="alignment">
        <option value="left">Слева</option>
        <option value="center">По центру</option>
        <option value="right">Справа</option>
    </select>
</div>

<!-- Новости -->
<div class="section-field-group">
    <label class="field-checkbox">
        <input type="checkbox" name="show_news">
        Показывать блок последних новостей (3 шт.)
    </label>
    <div class="form-group" style="margin-top:8px">
        <label>Расположение новостей</label>
        <select name="news_position">
            <option value="right">Справа</option>
            <option value="left">Слева</option>
            <option value="bottom">Снизу</option>
        </select>
    </div>
</div>

<script>
function uploadSectionImage(input, pathInputId, previewId, uploadTo) {
    if (!input.files || !input.files[0]) return;
    const formData = new FormData();
    formData.append('image', input.files[0]);
    formData.append('upload_to', uploadTo);
    formData.append('csrfmiddlewaretoken', getCookie('csrftoken'));

    fetch('/panel/pages/sections/upload-image/', {
        method: 'POST',
        body: formData,
    })
    .then(r => r.json())
    .then(data => {
        if (data.path) {
            document.getElementById(pathInputId).value = data.path;
            document.getElementById(previewId).innerHTML =
                '<img src="/media/' + data.path + '" ' +
                'style="max-height:80px;border-radius:6px;margin-top:4px">';
            updatePreview();
        }
    });
}
</script>
