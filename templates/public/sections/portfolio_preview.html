<section class="section section--gray">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">
                {{ section.content.title|default:'Наши работы' }}
            </h2>
            <p class="section-subtitle">
                {{ section.content.subtitle|default:'Посмотрите примеры наших фотографий' }}
            </p>
        </div>
        <div class="portfolio-grid">
            {% for photo in portfolio_preview %}
            <div class="portfolio-item"
                 onclick="openLightbox('{{ photo.image_watermarked|default:photo.image }}')">
                <img src="/media/{{ photo.thumbnail }}"
                     alt="{{ photo.filename }}" loading="lazy">
                <div class="portfolio-overlay"><span>🔍</span></div>
            </div>
            {% endfor %}
        </div>
        <div style="text-align:center;margin-top:32px">
            <a href="/portfolio/" class="btn-outline-pub">Всё портфолио →</a>
        </div>
    </div>
</section>

<!-- Лайтбокс (если не подключён из base) -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <div class="lightbox-inner">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <img id="lightboxImg" src="" alt="">
    </div>
</div>

<script>
function openLightbox(src) {
    document.getElementById('lightboxImg').src = '/media/' + src;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
});
</script>
